<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafiki — Just Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #fdf6ee;
    --bubble-me: #ff8a5c;
    --bubble-them: #ffffff;
    --text-dark: #3a2e26;
    --text-light: #8a7d72;
    --accent: #ff8a5c;
    --accent-soft: #ffe4d6;
    --line: rgba(58,46,38,0.08);
    --mic-active: #e04b3f;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    font-family:'Inter', sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    color: var(--text-dark);
  }

  header{
    padding: 16px 20px;
    background: white;
    border-bottom: 1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .avatar{
    width:42px; height:42px;
    border-radius:50%;
    background: linear-gradient(135deg, #ff8a5c, #ffb37b);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .header-text{ flex:1; }
  .header-text h1{
    font-family:'Poppins', sans-serif;
    font-size:17px;
    font-weight:600;
  }
  .header-text .status{
    font-size:12px;
    color: var(--text-light);
    display:flex;
    align-items:center;
    gap:5px;
  }
  .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:#4caf50;
    display:inline-block;
  }
  .voice-toggle{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color: var(--text-light);
    cursor:pointer;
    user-select:none;
    background: var(--bg);
    padding:6px 10px;
    border-radius:16px;
  }
  .voice-toggle input{ accent-color: var(--accent); cursor:pointer; }

  #chatArea{
    flex:1;
    overflow-y:auto;
    padding: 20px 16px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .msg{
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height:1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    animation: pop .18s ease;
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .msg.them{
    background: var(--bubble-them);
    align-self:flex-start;
    border-bottom-left-radius:4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .msg.me{
    background: var(--bubble-me);
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:4px;
  }

  .typing{
    align-self:flex-start;
    background: var(--bubble-them);
    padding: 12px 16px;
    border-radius: 18px;
    border-bottom-left-radius:4px;
    display:flex;
    gap:4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .typing span{
    width:6px; height:6px;
    background: var(--text-light);
    border-radius:50%;
    display:inline-block;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-4px);} }

  .empty-hint{
    text-align:center;
    color: var(--text-light);
    font-size:13px;
    margin-top:40px;
    line-height:1.6;
  }
  .empty-hint .big{ font-size:32px; margin-bottom:8px; }

  form{
    display:flex;
    gap:10px;
    padding: 14px 16px;
    background: white;
    border-top: 1px solid var(--line);
    align-items:center;
  }
  input[type=text]{
    flex:1;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 14.5px;
    font-family:'Inter', sans-serif;
    color: var(--text-dark);
  }
  input[type=text]:focus{ outline:none; border-color: var(--accent); }
  button{
    width:44px; height:44px;
    border-radius:50%;
    background: var(--accent);
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease, background .15s ease;
  }
  button:hover{ transform: scale(1.06); }
  button:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  #micBtn{
    background: white;
    color: var(--accent);
    border: 1px solid var(--line);
  }
  #micBtn.listening{
    background: var(--mic-active);
    color:white;
    border-color: var(--mic-active);
    animation: pulse 1.1s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 rgba(224,75,63,0.45); }
    70%{ box-shadow: 0 0 0 10px rgba(224,75,63,0); }
    100%{ box-shadow: 0 0 0 0 rgba(224,75,63,0); }
  }

  .error-note{
    text-align:center;
    color:#b5533a;
    font-size:12px;
    padding: 8px 16px;
    background: #fff0ec;
  }

  .listening-hint{
    text-align:center;
    color: var(--mic-active);
    font-size:12px;
    padding: 4px 16px 0;
  }
</style>
</head>
<body>

<header>
  <div class="avatar">🌻</div>
  <div class="header-text">
    <h1>Rafiki</h1>
    <div class="status"><span class="dot"></span>always here</div>
  </div>
  <label class="voice-toggle">
    <input type="checkbox" id="voiceReplyToggle" checked>
    🔊 speak replies
  </label>
</header>

<div id="chatArea">
  <div class="empty-hint" id="emptyHint">
    <div class="big">👋</div>
    Say hi to get started — Rafiki's just here to talk, listen, or keep you company.
  </div>
</div>

<div id="listeningHint" class="listening-hint" style="display:none;">listening... tap the mic again to stop</div>
<div id="errorNote"></div>

<form id="chatForm">
  <button type="button" id="micBtn" title="Talk to Rafiki">🎤</button>
  <input type="text" id="msgInput" placeholder="Type or tap the mic to talk..." autocomplete="off">
  <button type="submit">➤</button>
</form>

<script>
const OPENROUTER_API_KEY = "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";
const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";
const MODEL = "meta-llama/llama-3.1-8b-instruct:free";

// --- ElevenLabs voice (text-to-speech) ---
// Paste your ElevenLabs API key and a voice ID from your Voice Library.
// Default voice ID below ("Rachel") is one of ElevenLabs' standard preset voices.
const ELEVENLABS_API_KEY = "sk_0face88212464467a630fbbdfd6c74486cce82a82ddfe3f0";
const ELEVENLABS_VOICE_ID = "21m00Tcm4TlvDq8ikWAM"; // Rachel (default preset voice)
const ELEVENLABS_MODEL_ID = "eleven_turbo_v2_5"; // fast + cheap on credits
const ELEVENLABS_TTS_URL = `https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`;

const SYSTEM_PROMPT = `You are Rafiki, a warm, down-to-earth friend chatting casually with someone. Not an assistant, not formal, not overly helpful-sounding — just a genuine friend having a conversation. Keep replies fairly short and natural, like real texting, not essays. Use casual language, show real interest, ask follow-up questions sometimes, react like a real person would (with warmth, humor, empathy, whatever fits). Never say things like "As an AI" or break character. Never give clinical advice — if something serious comes up, respond like a caring friend would, and gently suggest talking to someone qualified if it seems important, without being preachy about it.`;

const STORAGE_KEY = "rafiki_chat_history";
let history = [];

function loadHistory(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) history = JSON.parse(saved);
  }catch(e){ history = []; }
}
function saveHistory(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); }catch(e){}
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderHistory(){
  const area = document.getElementById('chatArea');
  const hint = document.getElementById('emptyHint');
  if(history.length === 0){
    if(hint) hint.style.display = 'block';
    return;
  }
  if(hint) hint.remove();
  area.innerHTML = history.map(m =>
    `<div class="msg ${m.role === 'user' ? 'me' : 'them'}">${escapeHtml(m.content)}</div>`
  ).join('');
  area.scrollTop = area.scrollHeight;
}

function showTyping(){
  const area = document.getElementById('chatArea');
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}
function hideTyping(){
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
}

function showError(msg){
  document.getElementById('errorNote').innerHTML = `<div class="error-note">${escapeHtml(msg)}</div>`;
}
function clearError(){
  document.getElementById('errorNote').innerHTML = '';
}

/* ---------------- Voice: speech-to-text (listening) ---------------- */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;
let isListening = false;

const micBtn = document.getElementById('micBtn');
const listeningHint = document.getElementById('listeningHint');
const msgInput = document.getElementById('msgInput');

if(SpeechRecognition){
  recognizer = new SpeechRecognition();
  recognizer.lang = 'en-US';
  recognizer.interimResults = true;
  recognizer.continuous = false;

  recognizer.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    listeningHint.style.display = 'block';
    clearError();
  };

  recognizer.onresult = (event) => {
    let transcript = '';
    for(let i = 0; i < event.results.length; i++){
      transcript += event.results[i][0].transcript;
    }
    msgInput.value = transcript;
  };

  recognizer.onerror = (event) => {
    if(event.error === 'not-allowed' || event.error === 'service-not-allowed'){
      showError("Mic access denied — allow microphone permission to talk to Rafiki.");
    } else if(event.error !== 'no-speech' && event.error !== 'aborted'){
      showError("Didn't catch that — try again.");
    }
  };

  recognizer.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    listeningHint.style.display = 'none';
    // auto-send if we captured something
    const text = msgInput.value.trim();
    if(text){
      msgInput.value = '';
      sendMessage(text);
    }
  };

  micBtn.addEventListener('click', () => {
    if(isListening){
      recognizer.stop();
    } else {
      msgInput.value = '';
      try{ recognizer.start(); }catch(e){ /* already started */ }
    }
  });
} else {
  micBtn.disabled = true;
  micBtn.title = "Voice input isn't supported in this browser";
  micBtn.style.opacity = 0.4;
}

/* ---------------- Voice: text-to-speech (Rafiki talking back) ---------------- */

let currentAudio = null;

async function speak(text){
  const toggle = document.getElementById('voiceReplyToggle');
  if(!toggle.checked) return;

  // stop any voice currently playing
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }

  try{
    const res = await fetch(ELEVENLABS_TTS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "xi-api-key": ELEVENLABS_API_KEY
      },
      body: JSON.stringify({
        text: text,
        model_id: ELEVENLABS_MODEL_ID,
        voice_settings: { stability: 0.45, similarity_boost: 0.8 }
      })
    });

    if(!res.ok){
      console.error("ElevenLabs TTS error:", res.status, await res.text());
      fallbackSpeak(text); // fall back to free browser voice if ElevenLabs fails
      return;
    }

    const audioBlob = await res.blob();
    const audioUrl = URL.createObjectURL(audioBlob);
    currentAudio = new Audio(audioUrl);
    currentAudio.play();
  }catch(e){
    console.error("ElevenLabs TTS request failed:", e);
    fallbackSpeak(text);
  }
}

// Fallback: free built-in browser voice, used only if ElevenLabs fails
// (e.g. no key set yet, or free monthly character quota is used up)
function fallbackSpeak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.0;
  utter.pitch = 1.05;
  window.speechSynthesis.speak(utter);
}

/* ---------------- Sending messages ---------------- */

async function sendMessage(text){
  history.push({ role: 'user', content: text });
  renderHistory();
  saveHistory();
  showTyping();
  clearError();

  const sendBtn = document.querySelector('#chatForm button[type=submit]');
  sendBtn.disabled = true;
  micBtn.disabled = true;

  try{
    const res = await fetch(OPENROUTER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENROUTER_API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    hideTyping();

    if(!res.ok){
      const errText = await res.text();
      console.error("OpenRouter error:", res.status, errText);
      showError("Couldn't get a reply right now — try again in a moment.");
      sendBtn.disabled = false;
      micBtn.disabled = false;
      return;
    }

    const data = await res.json();
    const reply = data?.choices?.[0]?.message?.content?.trim() || "Hmm, I didn't quite catch that — say it again?";
    history.push({ role: 'assistant', content: reply });
    renderHistory();
    saveHistory();
    speak(reply);
  }catch(e){
    hideTyping();
    showError("Connection hiccup — check your internet and try again.");
  }

  sendBtn.disabled = false;
  micBtn.disabled = false;
}

document.getElementById('chatForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const text = msgInput.value.trim();
  if(!text) return;
  msgInput.value = '';
  sendMessage(text);
});

// Some browsers load voices asynchronously
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

loadHistory();
renderHistory();
</script>
</body>
</html>
